<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="g1" cx="50%" cy="60%" r="50%">
      <stop offset="0%"   stop-color="#00e5ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0066aa" stop-opacity="1"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#040c18"/>

  <!-- Outer ring (gauge arc) -->
  <circle cx="16" cy="16" r="12" fill="none" stroke="#1a3352" stroke-width="2"/>

  <!-- Gauge arc (cyan) -->
  <circle cx="16" cy="16" r="12" fill="none"
    stroke="url(#g1)" stroke-width="2.5"
    stroke-dasharray="52 75"
    stroke-dashoffset="19"
    stroke-linecap="round"
    filter="url(#glow)"
    transform="rotate(-220 16 16)"
  />

  <!-- Flame body -->
  <path
    d="M16 22 C12.5 19 11 16 12.5 12.5 C13.5 14 14 14.5 14.5 13 C15 11.5 15.5 10 16 8 C17.5 10.5 18 13 16.5 14.5 C17.5 13.5 19 13 19 11 C20.5 13 21 15.5 19 18.5 C18 20.5 16 22 16 22Z"
    fill="url(#g1)"
    filter="url(#glow)"
    opacity="0.95"
  />

  <!-- Center glow dot -->
  <circle cx="16" cy="19" r="1.5" fill="#ffffff" opacity="0.5"/>

  <!-- Tick marks -->
  <line x1="16" y1="4.5" x2="16" y2="6"   stroke="#1a3352" stroke-width="1" transform="rotate(0   16 16)"/>
  <line x1="16" y1="4.5" x2="16" y2="6"   stroke="#1a3352" stroke-width="1" transform="rotate(45  16 16)"/>
  <line x1="16" y1="4.5" x2="16" y2="6"   stroke="#1a3352" stroke-width="1" transform="rotate(90  16 16)"/>
  <line x1="16" y1="4.5" x2="16" y2="6"   stroke="#1a3352" stroke-width="1" transform="rotate(135 16 16)"/>
  <line x1="16" y1="4.5" x2="16" y2="6"   stroke="#1a3352" stroke-width="1" transform="rotate(180 16 16)"/>
  <line x1="16" y1="4.5" x2="16" y2="6"   stroke="#1a3352" stroke-width="1" transform="rotate(225 16 16)"/>
  <line x1="16" y1="4.5" x2="16" y2="6"   stroke="#1a3352" stroke-width="1" transform="rotate(270 16 16)"/>
  <line x1="16" y1="4.5" x2="16" y2="6"   stroke="#1a3352" stroke-width="1" transform="rotate(315 16 16)"/>
</svg>
